# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Build and Create Release

on:
  push:
    branches: [ "main" ]

jobs:
  check-tag:
    name: Check build tag
    runs-on: ubuntu-latest
    outputs: 
        releaseExists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Library Project version 
        id: get-version
        uses: beaconbrigade/package-json-version@v0.3.2
        with:
          path: /projects/ez-ui/.

      - uses: mukunku/tag-exists-action@v1.6.0
        id: check-tag
        with: 
          tag: 'v${{ steps.get-version.outputs.version }}'

  publish-npm:
    name: Build and Create Release
    needs: check-tag
    if: needs.check-tag.outputs.releaseExists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 25.4.0
          registry-url: https://registry.npmjs.org/
      - run: npm ci
      - run: npm publish ./projects/ez-ui --access public
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
