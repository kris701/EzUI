# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Build and Create Release

on:
  push:
    branches: [ "main" ]

jobs:
  check-tag:
    name: Check build tag
    runs-on: ubuntu-latest
    outputs: 
        releaseExists: ${{ steps.check-tag.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Get Library Project version 
        id: get-version
        uses: beaconbrigade/package-json-version@v0.3.2
        with:
          path: ./projects/ez-ui/

      - uses: mukunku/tag-exists-action@v1.6.0
        id: check-tag
        with: 
          tag: 'v${{ steps.get-version.outputs.version }}'

  publish-npm:
    name: Build and Create Release
    needs: check-tag
    if: needs.check-tag.outputs.releaseExists == 'false'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 26.4.0
          registry-url: https://registry.npmjs.org/
      
      - name: Install Angular CLI
        run: npm i @angular/cli -g

      - name: Install dependencies
        run: npm i
        
      - name: Build package
        run: ng build @kris701/ez-ui
        
      - name: Publish Package
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_TOKEN}}
        run: |
            cd ./dist/ez-ui
            npm publish --access public

      - name: Pack package (for Git release)
        run: npm pack ./dist/ez-ui/

      - name: Get Library Project version 
        id: get-version
        uses: beaconbrigade/package-json-version@v0.3.2
        with:
          path: ./projects/ez-ui/

      - name: Create Tag
        continue-on-error: true
        uses: rickstaa/action-create-tag@v1
        id: "tag_create"
        with:
          tag: "v${{ steps.get-version.outputs.version }}"
          message: "Latest release"
      
      - name: Generate Release
        uses: ncipollo/release-action@v1
        with:
          skipIfReleaseExists: true
          artifacts: "*.tgz"
          tag: "v${{ steps.get-version.outputs.version }}"
          generateReleaseNotes: true
